<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HydroGrow Account</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-alt);
            padding: 20px;
        }
        .auth-card {
            background: var(--card);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .auth-logo {
            color: var(--primary);
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        [data-theme="dark"] .auth-logo { color: var(--secondary); }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
            position: relative;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            padding-right: 40px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: var(--bg);
            color: var(--text);
        }
        .eye-icon {
            position: absolute;
            right: 12px;
            bottom: 12px;
            cursor: pointer;
            color: var(--text-muted);
        }
        .auth-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            margin-bottom: 25px;
        }
        .auth-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .social-login {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
        }
        .social-btn:hover { background-color: var(--border); }
        .auth-footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
        }
        [data-theme="dark"] .auth-footer a { color: var(--secondary); }
    </style>
</head>
<body>

    <div class="auth-card">
        <a href="index.html" class="auth-logo">
            <i class="fas fa-leaf"></i>
            <span>HydroGrow</span>
        </a>
        
        <form action="dashboard.html">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@company.com" required>
            </div>
            <div class="form-group" style="margin-bottom: 15px;">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
                <i class="fas fa-eye eye-icon" id="togglePassword"></i>
            </div>
            
            <div class="auth-options">
                <label>
                    <input type="checkbox"> Remember Me
                </label>
                <a href="#" style="color: var(--primary);">Forgot Password?</a>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>
        
        <div class="social-login">
            <button class="social-btn">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="20" alt="Google">
                Sign in with Google
            </button>
            <button class="social-btn">
                <i class="fab fa-apple fa-lg"></i>
                Sign in with Apple
            </button>
        </div>
        
        <div class="auth-footer">
            Don't have an account? <a href="register.html">Sign Up</a>
        </div>
    </div>

    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
