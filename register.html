<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Register - AgriCulture Hydroponics</title>
  <link href="assets/img/logo.png" rel="icon">
  <link href="assets/img/logo.png" rel="apple-touch-icon">
  
  <!-- Vendor CSS Files -->
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  
  <!-- Shared Styles -->
  <link href="assets/css/theme-rtl.css" rel="stylesheet">
  
  <style>
    body {
      background: linear-gradient(135deg, var(--light-section-bg) 0%, var(--background-color) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .register-card {
      background: var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      box-shadow: 0 10px 30px var(--shadow-color);
      width: 100%;
      max-width: 500px;
      padding: 40px;
    }
    .logo-centered {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent-color);
      text-align: center;
      margin-bottom: 20px;
    }
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 20px 0;
      opacity: 0.5;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border-color);
    }
    .strength-bar {
      height: 4px;
      width: 100%;
      background: #eee;
      margin-top: 5px;
      border-radius: 2px;
      overflow: hidden;
    }
    .strength-level {
      height: 100%;
      width: 30%;
      background: #ffc107;
      transition: 0.3s;
    }

    @media (max-width: 991.98px) {
      .terms-inline .form-check-label {
        white-space: nowrap;
        font-size: 0.78rem;
      }
    }
  </style>
</head>

<body class="auth-page">

  <div class="register-card">
    <a href="index.html" class="logo-centered d-block text-decoration-none mb-4">
      <img src="assets/img/logo.png" alt="AgriCulture Logo" class="mx-auto d-block" style="max-height: 50px;">
    </a>
    <div class="text-center mb-4">
      <h3 class="fw-bold">Create Account</h3>
      <p class="text-muted small">Start your hydroponic journey today</p>
    </div>

    <form>
      <div class="mb-3">
        <label class="form-label small fw-bold">First Name</label>
        <input type="text" class="form-control" placeholder="John">
      </div>
      <div class="mb-3">
        <label class="form-label small fw-bold">Last Name</label>
        <input type="text" class="form-control" placeholder="Doe">
      </div>
      
      <div class="mb-3">
        <label class="form-label small fw-bold">Email Address</label>
        <input type="email" class="form-control" placeholder="name@example.com">
      </div>

      <div class="mb-3">
        <label class="form-label small fw-bold">Password</label>
        <div class="input-group">
          <input type="password" class="form-control" id="regPass" placeholder="Create password">
          <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('regPass')">
            <i class="bi bi-eye"></i>
          </button>
        </div>
        <div class="strength-bar"><div class="strength-level"></div></div>
        <small class="text-muted" style="font-size: 0.7rem;">Password strength: Medium</small>
      </div>

      <div class="mb-4">
        <label class="form-label small fw-bold">Confirm Password</label>
        <div class="input-group">
          <input type="password" class="form-control" id="regConfirm" placeholder="Confirm password">
          <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('regConfirm')">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      
      <div class="form-check mb-4 terms-inline">
        <input class="form-check-input" type="checkbox" id="termsAgree">
        <label class="form-check-label small" for="termsAgree">
          I agree to the <a href="#" class="text-success">Terms of Service</a> and <a href="#" class="text-success">Privacy Policy</a>
        </label>
      </div>

      <button type="submit" class="btn btn-success w-100 py-2 mb-3">Create Account</button>
      
      <div class="divider small fw-bold">OR</div>
      
      <button type="button" class="btn btn-outline-dark w-100 py-2 d-flex align-items-center justify-content-center gap-2">
        <i class="bi bi-google"></i> Continue with Google
      </button>

      <div class="text-center mt-4 pt-3 border-top">
        <p class="small mb-0">Already have an account? <a href="login.html" class="text-success fw-bold">Sign In</a></p>
      </div>
    </form>
  </div>

  <script src="assets/js/theme-rtl.js"></script>
  <script>
    function togglePassword(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
      const icon = event.currentTarget.querySelector('i');
      icon.classList.toggle('bi-eye');
      icon.classList.toggle('bi-eye-slash');
    }
  </script>
</body>

</html>
